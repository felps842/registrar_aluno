<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastroStyle.css">
</head>
<body>
    <form id="form">
        <div class="container">
            <h1>Faça seu cadastro</h1>
            
            <h4 class="usuario">Nome de Usuário:</h4>
            <input class="emailInput" type="text" id="email" placeholder="Email">    
            
            <h4 class="email">Email:</h4>
            <input class="emailInput" type="text" id="email" placeholder="Email">
    
            <h4 class="senha">Senha:</h4>
            <input class="senhaInput" type="password" id="senha" placeholder="Senha">            
            
            <h4 class="confirm">Confirme sua senha:</h4>
            <input class="confirmacaoInput" type="password" id="confirmacao" placeholder="Repita a senha">
    
            <button id="cadastrar" type="submit">Criar cadastro</button>
        </div>
    </form>
</body>
</html>
