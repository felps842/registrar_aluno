<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="../CSS/tarefasStyle.css">
    <link rel="icon" href="../imagens/ChatGPT Image 7 de mar. de 2026, 16_38_13.png">
</head>
<body>
    <header>
        <div>
            <img src="../imagens/ChatGPT Image 7 de mar. de 2026, 16_38_13.png" alt="logo">
            <h1 class="Titulo">Task Manager</h1>
        </div>

        <div>
            <h1 class="welcome">Bem Vindo, <span id="nome"></span></h1>
            <button class="submit">Sair</button>
        </div>
    </header>

    <div class="container1">
        <h1>Adicione uma tarefa</h1>
        <input type="text" placeholder="Tarefa" id="inputTarefa">
        <button class="addTarefa" id="buttonTarefa">Adicionar</button>
    </div>

    <div class="container2">
        <h1>Tarefas a cumprir</h1>
        <ul>
            <li>
                <span>Lavar louça</span>
                <div class="botoes">
                    <button class="completar">✔</button>
                    <button class="deletar">✖</button>
                </div>
            </li>

            <li>
                <span>Ir a academia</span>
                <div class="botoes">
                    <button class="completar">✔</button>
                    <button class="deletar">✖</button>
                </div>
            </li>
        </ul>
    </div>
    
    <script src="tarefasScript.js"></script>
</body>
</html>
